<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Rock paper scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main">
    <div class="btns">
      <button id="rock" class="btn">✊</button>
      <button id="paper" class="btn">✋</button>
      <button id="scissors" class="btn">✌️</button>
    </div>
    <div class="feedback">
      <p id="p-choice" class="para"></p>
      <p id="c-choice" class="para"></p>
      <p id="winner" class="para"></p>
      <button id="try">Try Again</button>
    </div>
  </div>
</body>
<script src="script.js"></script>
</html>
