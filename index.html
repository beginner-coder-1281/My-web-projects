<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Website</title>
</head>
<body>
    <div class="container">
        <div class="display-div">
            <input id="display" readonly>
        </div>
        <div class="buttons">
            
            <!-- Row 1 !-->
            <button class="util" id="clear">C</button>
            <button class="util" id="backspace">⌫</button>
            <button class="operator" id="square">x²</button>
            <button class="operator" id="divide">÷</button>
            
            <!-- Row 2 !-->
            <button class="number" id="7">7</button>
            <button class="number" id="8">8</button>
            <button class="number" id="9">9</button>
            <button class="operator" id="multiply">X</button>
            
            <!-- Row 3 !-->
            <button class="number" id="4">4</button>
            <button class="number" id="5">5</button>
            <button class="number" id="6">6</button>
            <button class="operator" id="subtract">—</button>
            
            <!-- Row 4 !-->
            <button class="number" id="1">1</button>
            <button class="number" id="2">2</button>
            <button class="number" id="3">3</button>
            <button class="operator" id="add">+</button>
            
            <!-- Row 5 !-->
            <button class="number" id="0">0</button>
            <button class="number" id="00">00</button>
            <button class="number" id=".">.</button>
            <button class="operator" id="equal">=</button>
            
        </div>
    </div>
</body>
<script src="https://unpkg.com/mathjs@15.1.1/lib/browser/math.js"></script>
<script src="script.js"></script>
</html>
